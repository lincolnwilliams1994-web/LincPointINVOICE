<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Linc Invoices">
<title>Linc Invoices</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--blue:#003399;--orange:#e85d10;--light:#f0f2f7;--white:#fff;--border:#dde2ee;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--light);color:#222;min-height:100vh;font-size:16px;}

/* NAV */
.nav{background:var(--blue);display:flex;align-items:center;padding:0 12px;position:sticky;top:0;z-index:50;height:54px;}
.nav-logo{height:36px;filter:brightness(0) invert(1);margin-right:10px;}
.nav-tabs{display:flex;flex:1;gap:0;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{background:transparent;color:rgba(255,255,255,0.65);border:none;border-bottom:3px solid transparent;padding:16px 14px 13px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;font-family:inherit;}
.nav-tab.active{color:#fff;border-bottom-color:var(--orange);}

/* PAGES */
.page{display:none;padding:14px 12px 60px;}
.page.active{display:block;}

/* FORM CARD */
.card{background:var(--white);border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.09);padding:16px;margin-bottom:12px;}

/* QUICK CLIENT SELECTOR */
.client-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.client-pill{flex:1;min-width:120px;padding:14px 10px;border:2px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;text-align:center;font-size:14px;font-weight:700;color:#555;font-family:inherit;transition:all 0.15s;}
.client-pill.selected{border-color:var(--blue);background:#eef2ff;color:var(--blue);}
.client-pill span{display:block;font-size:11px;font-weight:400;color:#999;margin-top:2px;}

/* FIELDS */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;background:var(--white);color:#222;-webkit-appearance:none;appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,51,153,0.1);}
.field .sub{font-size:12px;color:#aaa;margin-top:4px;}

/* LINE ITEMS */
.line-item{display:flex;gap:8px;margin-bottom:8px;align-items:stretch;}
.line-item input:first-child{flex:1;padding:13px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:inherit;}
.line-item input:first-child:focus{outline:none;border-color:var(--blue);}
.line-amount-wrap{position:relative;flex-shrink:0;width:110px;}
.line-amount-wrap::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888;font-size:16px;pointer-events:none;}
.line-amount-wrap input{width:100%;padding:13px 12px 13px 24px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;-webkit-appearance:none;}
.line-amount-wrap input:focus{outline:none;border-color:var(--blue);}
.btn-remove-line{background:#fff0ee;border:1.5px solid #ffd0c8;color:#cc3300;border-radius:9px;padding:0 14px;cursor:pointer;font-size:18px;font-weight:700;flex-shrink:0;min-height:48px;}

.btn-add-line{width:100%;padding:13px;border:1.5px dashed var(--border);border-radius:9px;background:transparent;color:var(--blue);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;}

/* TOTAL */
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#f7f9ff;border-radius:10px;margin:4px 0 16px;}
.total-bar span:first-child{font-size:14px;color:#666;font-weight:600;}
.total-bar span:last-child{font-size:22px;font-weight:800;color:var(--blue);}

/* BUTTONS */
.btn-generate{width:100%;padding:17px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:0.3px;}
.btn-generate:active{opacity:0.85;}

/* PREVIEW PAGE */
.preview-actions{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.btn-back{flex:1;padding:14px;background:var(--white);color:var(--blue);border:2px solid var(--blue);border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;min-width:80px;}
.btn-download{flex:2;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-save-hist{flex:2;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-print{flex:1;padding:14px;background:#f0f2f7;color:#444;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.email-hint{background:#f0f2f7;border-radius:8px;padding:10px 14px;font-size:13px;color:#555;margin-bottom:12px;line-height:1.5;}
.email-hint strong{color:var(--blue);}

/* HISTORY */
.summary-bar{background:var(--blue);color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.summary-bar .label{font-size:12px;opacity:0.75;}
.summary-bar .value{font-size:20px;font-weight:800;color:#ffcc00;}
.hist-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;}
.hist-item:last-child{border-bottom:none;}
.hist-ref{font-weight:700;color:var(--blue);font-size:14px;}
.hist-meta{font-size:13px;color:#666;margin-top:2px;}
.hist-desc{font-size:12px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.hist-amount{font-weight:800;font-size:16px;color:var(--orange);flex-shrink:0;}
.hist-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.btn-view{background:#eef2ff;color:var(--blue);border:1px solid #c0ccee;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.hist-filter{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:inherit;background:var(--white);-webkit-appearance:none;margin-bottom:12px;}
.empty{text-align:center;padding:48px 20px;color:#bbb;}
.empty-icon{font-size:44px;margin-bottom:10px;}
.empty p{font-size:14px;line-height:1.6;}

/* CLIENTS */
.client-card-item{border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.cc-name{font-weight:700;color:var(--blue);font-size:15px;margin-bottom:4px;}
.cc-badge{display:inline-block;background:var(--blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:4px;margin-left:6px;vertical-align:middle;}
.cc-detail{font-size:13px;color:#666;line-height:1.6;}
.cc-actions{display:flex;gap:8px;margin-top:10px;}
.btn-edit{background:#eef2ff;color:var(--blue);border:1px solid #c0ccee;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-del{background:#fff0ee;color:#cc3300;border:1px solid #ffd0c8;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-add-client{width:100%;padding:14px;background:var(--white);color:var(--blue);border:2px dashed #c0ccee;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--white);border-radius:18px 18px 0 0;padding:20px 16px 36px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:800;color:var(--blue);margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions .btn-generate{flex:2;}
.modal-actions .btn-back{flex:1;border-radius:10px;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* INVOICE DOC - print/preview */
.invoice-doc{font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#222;background:#fff;padding:28px 32px;max-width:720px;margin:0 auto;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,0.1);}
.idoc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.idoc-logo{height:64px;object-fit:contain;}
.idoc-title{font-size:26px;font-weight:800;color:var(--blue);letter-spacing:2px;text-align:right;margin-bottom:5px;}
.idoc-meta{text-align:right;font-size:13px;line-height:1.7;}
.idoc-hr{border:none;border-top:2.5px solid var(--blue);margin:0 0 18px;}
.idoc-parties{display:flex;gap:16px;margin-bottom:20px;}
.idoc-party{flex:1;border:1px solid #ddd;padding:12px 14px;border-radius:6px;font-size:12.5px;line-height:1.65;}
.idoc-party-label{font-weight:700;font-size:13px;margin-bottom:5px;}
.idoc-table{width:100%;border-collapse:collapse;margin-bottom:18px;}
.idoc-table th{background:var(--blue);color:#fff;padding:9px 13px;text-align:left;font-size:13px;}
.idoc-table th:last-child{text-align:right;}
.idoc-table td{padding:10px 13px;border-bottom:1px solid #eee;font-size:13px;}
.idoc-table td:last-child{text-align:right;}
.idoc-totals{display:flex;justify-content:flex-end;margin-bottom:20px;}
.idoc-totals-box{width:240px;}
.idoc-trow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:13px;}
.idoc-tfinal{display:flex;justify-content:space-between;padding:9px 0;font-weight:800;font-size:15px;border-top:2px solid var(--blue);}
.idoc-payment{border:1px solid #ddd;padding:12px 14px;border-radius:6px;margin-bottom:18px;font-size:12.5px;line-height:1.7;}
.idoc-payment-label{font-weight:700;margin-bottom:4px;}
.idoc-footer-hr{border:none;border-top:1px solid #ddd;}
.idoc-footer{text-align:center;font-size:10.5px;color:#999;margin-top:7px;}

@media print{
  body{background:#fff;}
  .no-print{display:none!important;}
  .invoice-doc{padding:0;box-shadow:none;border-radius:0;}
  .page{display:block!important;padding:0;}
  #page-preview .preview-actions{display:none;}
  #page-preview .email-hint{display:none;}
}
@media(max-width:400px){
  .idoc-parties{flex-direction:column;}
  .preview-actions{flex-wrap:wrap;}
}
</style>
</head>

<!-- NEW INVOICE -->
<div class="page active" id="page-new">
  <div class="card">
    <div class="field" style="margin-bottom:10px;">
      <label>Bill To</label>
      <div class="client-pills" id="client-pills"></div>
    </div>
    <div id="other-client-fields" style="display:none;">
      <div class="field"><label>Client Name</label><input type="text" id="f-custom-name" placeholder="Business name"></div>
      <div class="field"><label>ABN (optional)</label><input type="text" id="f-custom-abn" placeholder="xx xxx xxx xxx"></div>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label>Invoice Date</label>
      <input type="text" id="f-date" placeholder="dd/mm/yyyy" oninput="updateRef()">
    </div>
    <div class="field">
      <label>Invoice #</label>
      <div class="field"><div style="padding:11px 14px;background:#f4f6fb;border:1.5px solid var(--border);border-radius:9px;font-size:15px;color:#666;font-weight:600;" id="f-ref">-</div></div>
    </div>
  </div>

  <div class="card">
    <div class="field"><label>What are you invoicing for?</label></div>
    <div id="line-items"></div>
    <button class="btn-add-line" onclick="addLine()">+ Add another line</button>
    <div class="total-bar" style="margin-top:14px;">
      <span>Total</span>
      <span id="f-total">$0.00</span>
    </div>
    <button class="btn-generate" onclick="generateInvoice()">Generate Invoice</button>
  </div>
</div>

<!-- PREVIEW -->
<div class="page" id="page-preview">
  <div class="preview-actions no-print">
    <button class="btn-back" onclick="showTab('new')">Edit</button>
    <button class="btn-download" onclick="downloadPDF()">Download PDF</button>
    <button class="btn-save-hist" onclick="saveToHistory()">Save</button>
  </div>
  <div class="email-hint no-print" id="email-hint"></div>
  <div id="invoice-render"></div>
  <div class="preview-actions no-print" style="margin-top:12px;">
    <button class="btn-print" onclick="window.print()">Print</button>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="summary-bar" id="hist-summary" style="display:none;">
    <div><div class="label">Total invoiced</div><div class="value" id="hist-total">$0.00</div></div>
    <div style="text-align:right;"><div class="label">Invoices</div><div class="value" id="hist-count">0</div></div>
  </div>
  <select class="hist-filter" id="hist-filter" onchange="renderHistory()"><option value="all">All clients</option></select>
  <div class="card" id="hist-list"></div>
</div>

<!-- CLIENTS -->
<div class="page" id="page-clients">
  <button class="btn-add-client" onclick="openClientModal(null)">+ Add New Client</button>
  <div id="client-list"></div>
</div>

<!-- CLIENT MODAL -->
<div class="modal-bg" id="client-modal" style="display:none;" onclick="if(event.target===this)closeClientModal()">
  <div class="modal-box">
    <div class="modal-title" id="cm-title">Add Client</div>
    <div class="field"><label>Client Name *</label><input type="text" id="cm-name" placeholder="e.g. Munro Building Group"></div>
    <div class="field"><label>Invoice Prefix * (2-5 letters)</label><input type="text" id="cm-prefix" placeholder="e.g. MBG" maxlength="5" style="text-transform:uppercase;"></div>
    <div class="field"><label>ABN</label><input type="text" id="cm-abn" placeholder="xx xxx xxx xxx"></div>
    <div class="field"><label>Address</label><input type="text" id="cm-address" placeholder="Street, Suburb STATE postcode"></div>
    <div class="field"><label>Email(s)</label><input type="text" id="cm-email" placeholder="accounts@business.com.au"></div>
    <div class="field"><label>Phone</label><input type="text" id="cm-phone" placeholder="07 xxxx xxxx"></div>
    <div class="modal-actions">
      <button class="btn-back" onclick="closeClientModal()">Cancel</button>
      <button class="btn-generate" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

function pad2(n){return String(n).padStart(2,"0");}
function todayStr(){var d=new Date();return pad2(d.getDate())+"/"+pad2(d.getMonth()+1)+"/"+d.getFullYear();}
function fmt(v){var n=parseFloat(v)||0;return"$"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");}
function totalLines(lines){return lines.reduce(function(s,l){return s+(parseFloat(l.amount)||0);},0);}
function dateToRef(dateStr,prefix,seq){
  var p=dateStr.split("/");
  if(p.length!==3)return prefix+"000000"+pad2(seq);
  return prefix+p[0]+p[1]+p[2].slice(-2)+pad2(seq);
}
function normaliseDate(raw){
  if(!raw)return todayStr();
  raw=raw.trim();
  var m=raw.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})$/);
  if(m){var dd=pad2(m[1]),mm=pad2(m[2]),yy=m[3];if(yy.length===2)yy="20"+yy;return dd+"/"+mm+"/"+yy;}
  var d=raw.replace(/\D/g,"");
  if(d.length===6)return d.slice(0,2)+"/"+d.slice(2,4)+"/20"+d.slice(4);
  if(d.length===8)return d.slice(0,2)+"/"+d.slice(2,4)+"/"+d.slice(4);
  return todayStr();
}

function saveData(){try{localStorage.setItem("lp-clients",JSON.stringify(clients));localStorage.setItem("lp-invoices",JSON.stringify(invoices));}catch(e){}}
function loadData(){
  try{
    var c=localStorage.getItem("lp-clients");
    var i=localStorage.getItem("lp-invoices");
    clients=c?JSON.parse(c):JSON.parse(JSON.stringify(DEFAULT_CLIENTS));
    invoices=i?JSON.parse(i):[];
    if(!c)saveData();
    nextSeq=invoices.reduce(function(m,inv){return Math.max(m,(inv.seq||1));},0)+1;
  }catch(e){clients=JSON.parse(JSON.stringify(DEFAULT_CLIENTS));invoices=[];}
}

function toast(msg,ms){
  ms=ms||2500;
  var el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},ms);
}

function showTab(tab){
  ["new","preview","history","clients"].forEach(function(t){
    document.getElementById("page-"+t).classList.toggle("active",t===tab);
    var btn=document.getElementById("tab-"+t);
    if(btn)btn.classList.toggle("active",t===tab);
  });
  if(tab==="history"){renderHistoryFilter();renderHistory();}
  if(tab==="clients")renderClients();
}

// CLIENT PILLS
function renderPills(){
  var container=document.getElementById("client-pills");
  var pills=clients.map(function(c){
    return'<button class="client-pill'+(selectedClientId===c.id?" selected":"")+'" onclick="selectClient(\''+c.id+'\')" id="pill-'+c.id+'">'+c.name+'<span>'+c.prefix+'</span></button>';
  }).join("")+'<button class="client-pill'+(selectedClientId==="other"?" selected":"")+'" onclick="selectClient(\'other\')" id="pill-other">Other<span>Custom</span></button>';
  container.innerHTML=pills;
  document.getElementById("other-client-fields").style.display=selectedClientId==="other"?"block":"none";
  updateRef();
}
function selectClient(id){
  selectedClientId=id;
  renderPills();
}

// REF
function updateRef(){
  var client=clients.find(function(c){return c.id===selectedClientId;});
  var prefix=client?client.prefix:"INV";
  var date=normaliseDate(document.getElementById("f-date").value||todayStr());
  document.getElementById("f-ref").textContent=dateToRef(date,prefix,nextSeq);
}

// LINE ITEMS
function addLine(desc,amt){
  var container=document.getElementById("line-items");
  var div=document.createElement("div");
  div.className="line-item";
  div.innerHTML='<input type="text" placeholder="Description (e.g. Commission - Barry deposit)" value="'+(desc||"")+'" oninput="updateTotal()" style="flex:1;padding:13px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;font-family:inherit;"><div class="line-amount-wrap"><input type="number" placeholder="0.00" value="'+(amt||"")+'" min="0" step="0.01" oninput="updateTotal()" style="width:100%;padding:13px 12px 13px 24px;border:1.5px solid var(--border);border-radius:9px;font-size:16px;font-family:inherit;-webkit-appearance:none;"></div><button class="btn-remove-line" onclick="this.parentElement.remove();updateTotal();">x</button>';
  container.appendChild(div);
  if(!desc)div.querySelector("input").focus();
  updateTotal();
}
function updateTotal(){
  var rows=document.querySelectorAll("#line-items .line-item");
  var t=0;
  rows.forEach(function(r){t+=parseFloat(r.querySelectorAll("input")[1].value)||0;});
  document.getElementById("f-total").textContent=fmt(t);
  updateRef();
}
function getLines(){
  var rows=document.querySelectorAll("#line-items .line-item");
  var lines=[];
  rows.forEach(function(r){
    var inputs=r.querySelectorAll("input");
    var desc=inputs[0].value.trim();
    var amt=inputs[1].value;
    if(desc)lines.push({description:desc,amount:amt||"0"});
  });
  return lines;
}

function generateInvoice(){
  var lines=getLines();
  if(!lines.length){toast("Add at least one line item.");return;}
  var date=normaliseDate(document.getElementById("f-date").value||todayStr());
  var client=clients.find(function(c){return c.id===selectedClientId;})||null;
  var inv={
    clientId:selectedClientId,
    customClient:selectedClientId==="other"?(document.getElementById("f-custom-name").value.trim()||"Client"):"",
    customABN:selectedClientId==="other"?(document.getElementById("f-custom-abn").value.trim()||""):"",
    date:date,
    lines:lines,
    seq:nextSeq
  };
  pendingInvoice=inv;
  renderInvoiceDoc(inv);

  // Email hint
  var hint="";
  if(client&&client.email){
    hint='<strong>Send to:</strong> '+client.email;
  }
  document.getElementById("email-hint").innerHTML=hint;
  document.getElementById("email-hint").style.display=hint?"block":"none";

  showTab("preview");
}

function saveToHistory(){
  if(!pendingInvoice)return;
  var client=clients.find(function(c){return c.id===pendingInvoice.clientId;});
  var ref=dateToRef(pendingInvoice.date,(client?client.prefix:"INV"),pendingInvoice.seq);
  var inv=Object.assign({},pendingInvoice,{ref:ref,savedAt:new Date().toISOString()});
  invoices.unshift(inv);nextSeq++;saveData();
  toast("Invoice "+ref+" saved to history.");
  // Reset form
  pendingInvoice=null;
  document.getElementById("line-items").innerHTML="";
  document.getElementById("f-date").value=todayStr();
  addLine();
  updateRef();
}

// DOWNLOAD PDF - uses print to PDF via hidden iframe trick / direct print
function downloadPDF(){
  if(!pendingInvoice)return;
  var client=clients.find(function(c){return c.id===pendingInvoice.clientId;});
  var ref=dateToRef(pendingInvoice.date,(client?client.prefix:"INV"),pendingInvoice.seq);
  // Build a clean print window
  var win=window.open("","_blank");
  if(!win){toast("Allow popups to download PDF.");return;}
  var docHtml=document.getElementById("invoice-render").innerHTML;
  win.document.write("<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>"+ref+"</title><style>body{font-family:Arial,sans-serif;margin:0;padding:0;}*{box-sizing:border-box;}.invoice-doc{font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#222;background:#fff;padding:28px 32px;max-width:720px;margin:0 auto;}.idoc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}.idoc-logo{height:64px;object-fit:contain;}.idoc-title{font-size:26px;font-weight:800;color:#003399;letter-spacing:2px;text-align:right;margin-bottom:5px;}.idoc-meta{text-align:right;font-size:13px;line-height:1.7;}.idoc-hr{border:none;border-top:2.5px solid #003399;margin:0 0 18px;}.idoc-parties{display:flex;gap:16px;margin-bottom:20px;}.idoc-party{flex:1;border:1px solid #ddd;padding:12px 14px;border-radius:6px;font-size:12.5px;line-height:1.65;}.idoc-party-label{font-weight:700;font-size:13px;margin-bottom:5px;}.idoc-table{width:100%;border-collapse:collapse;margin-bottom:18px;}.idoc-table th{background:#003399;color:#fff;padding:9px 13px;text-align:left;font-size:13px;}.idoc-table th:last-child{text-align:right;}.idoc-table td{padding:10px 13px;border-bottom:1px solid #eee;font-size:13px;}.idoc-table td:last-child{text-align:right;}.idoc-totals{display:flex;justify-content:flex-end;margin-bottom:20px;}.idoc-totals-box{width:240px;}.idoc-trow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:13px;}.idoc-tfinal{display:flex;justify-content:space-between;padding:9px 0;font-weight:800;font-size:15px;border-top:2px solid #003399;}.idoc-payment{border:1px solid #ddd;padding:12px 14px;border-radius:6px;margin-bottom:18px;font-size:12.5px;line-height:1.7;}.idoc-payment-label{font-weight:700;margin-bottom:4px;}.idoc-footer-hr{border:none;border-top:1px solid #ddd;}.idoc-footer{text-align:center;font-size:10.5px;color:#999;margin-top:7px;}</style></head><body>"+docHtml+"</body></html>");
  win.document.close();
  win.focus();
  setTimeout(function(){win.print();},400);
}

// RENDER INVOICE DOC
function renderInvoiceDoc(inv){
  var client=clients.find(function(c){return c.id===inv.clientId;})||null;
  var ref=dateToRef(inv.date,(client?client.prefix:"INV"),inv.seq);
  var billName=inv.clientId==="other"?(inv.customClient||"Client"):(client?client.name:"Unknown");
  var billABN=inv.clientId==="other"?inv.customABN:(client?client.abn:"");
  var billAddr=inv.clientId==="other"?"":(client?client.address:"");
  var total=totalLines(inv.lines);
  var linesHtml=inv.lines.map(function(l){return"<tr><td>"+l.description+"</td><td>"+fmt(l.amount)+"</td></tr>";}).join("");
  document.getElementById("invoice-render").innerHTML=
    '<div class="invoice-doc">'+
    '<div class="idoc-header">'+
    '<img src="'+LOGO_SRC+'" class="idoc-logo" alt="Linc Point">'+
    '<div><div class="idoc-title">INVOICE</div>'+
    '<div class="idoc-meta"><strong>Invoice Number:</strong> '+ref+'<br><strong>Invoice Date:</strong> '+inv.date+'<br><strong>Due Date:</strong> '+inv.date+'</div></div>'+
    '</div>'+
    '<hr class="idoc-hr">'+
    '<div class="idoc-parties">'+
    '<div class="idoc-party"><div class="idoc-party-label">From</div>'+FROM.name+'<br><span style="color:#666;font-size:12px;">'+FROM.trading+'</span><br>ABN: '+FROM.abn+'<br>'+FROM.gst+'<br><span style="color:#666;font-size:12px;">'+FROM.address+'<br>'+FROM.phone+' | '+FROM.email+'</span></div>'+
    '<div class="idoc-party"><div class="idoc-party-label">Bill To</div><strong>'+billName+'</strong>'+(billABN?"<br>ABN: "+billABN:"")+(billAddr?"<br><span style='color:#666;font-size:12px;'>"+billAddr+"</span>":"")+'</div>'+
    '</div>'+
    '<table class="idoc-table"><thead><tr><th>Description</th><th>Amount</th></tr></thead><tbody>'+linesHtml+'</tbody></table>'+
    '<div class="idoc-totals"><div class="idoc-totals-box">'+
    '<div class="idoc-trow"><span>Subtotal</span><span>'+fmt(total)+'</span></div>'+
    '<div class="idoc-trow"><span>GST</span><span>$0.00</span></div>'+
    '<div class="idoc-tfinal"><span>TOTAL DUE</span><span>'+fmt(total)+'</span></div>'+
    '</div></div>'+
    '<div class="idoc-payment"><div class="idoc-payment-label">Payment Details</div>'+BANK.bank+'<br>Account Name: '+BANK.name+'<br>BSB: '+BANK.bsb+'<br>Account Number: '+BANK.account+'<br>Payment Reference: '+ref+'</div>'+
    '<div style="margin-bottom:18px;font-size:13px;">Thank you for your business.</div>'+
    '<hr class="idoc-footer-hr">'+
    '<div class="idoc-footer">'+FROM.name+' | ABN '+FROM.abn+' | Invoice '+ref+'</div>'+
    '</div>';
}

// HISTORY
function renderHistoryFilter(){
  var sel=document.getElementById("hist-filter");
  var v=sel.value;
  sel.innerHTML='<option value="all">All clients</option>'+clients.map(function(c){return'<option value="'+c.id+'">'+c.name+'</option>';}).join('')+'<option value="other">Other</option>';
  sel.value=v;
}
function renderHistory(){
  var filter=document.getElementById("hist-filter").value;
  var list=filter==="all"?invoices:invoices.filter(function(i){return i.clientId===filter;});
  var total=invoices.reduce(function(s,i){return s+totalLines(i.lines);},0);
  var sumBar=document.getElementById("hist-summary");
  if(invoices.length){sumBar.style.display="flex";document.getElementById("hist-total").textContent=fmt(total);document.getElementById("hist-count").textContent=invoices.length;}
  else{sumBar.style.display="none";}
  var container=document.getElementById("hist-list");
  if(!list.length){container.innerHTML='<div class="empty"><div class="empty-icon">&#128203;</div><p>No invoices yet.<br>Tap <strong>New Invoice</strong> to create your first one.</p></div>';return;}
  container.innerHTML=list.map(function(inv,i){
    var client=clients.find(function(c){return c.id===inv.clientId;})||null;
    var billName=inv.clientId==="other"?(inv.customClient||"Client"):(client?client.name:"Unknown");
    var t=totalLines(inv.lines);
    var realIdx=invoices.indexOf(inv);
    return'<div class="hist-item"><div style="flex:1;min-width:0;"><div class="hist-ref">'+(inv.ref||"INV")+'</div><div class="hist-meta">'+inv.date+' - '+billName+'</div><div class="hist-desc">'+inv.lines.map(function(l){return l.description;}).join(" | ")+'</div></div><div class="hist-right"><div class="hist-amount">'+fmt(t)+'</div><button class="btn-view" onclick="viewHistInv('+realIdx+')">View</button></div></div>';
  }).join("");
}
function viewHistInv(idx){
  var inv=invoices[idx];if(!inv)return;
  var prev=pendingInvoice;
  pendingInvoice=null;
  renderInvoiceDoc(inv);
  var client=clients.find(function(c){return c.id===inv.clientId;})||null;
  var hint=client&&client.email?'<strong>Send to:</strong> '+client.email:"";
  document.getElementById("email-hint").innerHTML=hint;
  document.getElementById("email-hint").style.display=hint?"block":"none";
  showTab("preview");
  // In history view mode, save button becomes close
  document.querySelector(".btn-save-hist").textContent="Done";
  document.querySelector(".btn-save-hist").onclick=function(){showTab("history");document.querySelector(".btn-save-hist").textContent="Save";document.querySelector(".btn-save-hist").onclick=saveToHistory;};
  pendingInvoice=prev;
}

// CLIENTS
function renderClients(){
  var container=document.getElementById("client-list");
  if(!clients.length){container.innerHTML='<div class="empty"><p>No clients. Add one above.</p></div>';return;}
  container.innerHTML=clients.map(function(c){
    return'<div class="client-card-item"><div class="cc-name">'+c.name+'<span class="cc-badge">'+c.prefix+'</span></div>'+
    '<div class="cc-detail">'+(c.abn?"ABN: "+c.abn+"<br>":"")+(c.address?c.address+"<br>":"")+(c.email?c.email+"<br>":"")+(c.phone?c.phone:"")+'</div>'+
    '<div class="cc-actions"><button class="btn-edit" onclick="openClientModal(\''+c.id+'\')">Edit</button><button class="btn-del" onclick="deleteClient(\''+c.id+'\')">Delete</button></div>'+
    '</div>';
  }).join("");
}
function openClientModal(id){
  editingClientId=id;
  var c=id?clients.find(function(cl){return cl.id===id;}):null;
  document.getElementById("cm-title").textContent=id?"Edit Client":"Add Client";
  document.getElementById("cm-name").value=c?c.name:"";
  document.getElementById("cm-prefix").value=c?c.prefix:"";
  document.getElementById("cm-abn").value=c?c.abn:"";
  document.getElementById("cm-address").value=c?c.address:"";
  document.getElementById("cm-email").value=c?c.email:"";
  document.getElementById("cm-phone").value=c?c.phone:"";
  document.getElementById("client-modal").style.display="flex";
}
function closeClientModal(){document.getElementById("client-modal").style.display="none";}
function saveClient(){
  var name=document.getElementById("cm-name").value.trim();
  var prefix=document.getElementById("cm-prefix").value.trim().toUpperCase();
  if(!name||!prefix){toast("Name and prefix are required.");return;}
  var c={
    id:editingClientId||(name.toLowerCase().replace(/[^a-z0-9]/g,"")+Date.now().toString().slice(-4)),
    name:name,prefix:prefix,
    abn:document.getElementById("cm-abn").value.trim(),
    address:document.getElementById("cm-address").value.trim(),
    email:document.getElementById("cm-email").value.trim(),
    phone:document.getElementById("cm-phone").value.trim()
  };
  if(editingClientId){var idx=clients.findIndex(function(cl){return cl.id===editingClientId;});if(idx>=0)clients[idx]=c;}
  else clients.push(c);
  saveData();renderClients();renderPills();closeClientModal();toast(editingClientId?"Client updated.":"Client added.");
}
function deleteClient(id){
  if(!confirm("Delete this client?"))return;
  clients=clients.filter(function(c){return c.id!==id;});
  saveData();renderClients();renderPills();toast("Deleted.");
}

// INIT
loadData();
renderPills();
document.getElementById("f-date").value=todayStr();
addLine();
updateRef();
</script>
</body>
</html>
